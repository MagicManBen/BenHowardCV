<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applied Jobs</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="jobspy.html">Job Search</a>
    <a href="ai-job-search.html">AI Job Search</a>
    <a href="dashboard.html" class="active">Applied Jobs</a>
    <a href="reviews.html">Reviews</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" class="nav-link--muted">New Application</a>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Applications</p>
      <h1 class="page-title">Published Jobs</h1>
      <p class="page-subtitle">A cleaner overview of every application you have already published to Supabase.</p>
      <p><button type="button" id="download-backup-button">Download Backup JSON</button></p>
    </section>

    <div class="page-grid">
      <section class="status-bar">
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">Checking...</span></div>
      </section>

      <section class="results-shell">
        <div id="results"><p class="empty-msg">Loading applications...</p></div>
      </section>
    </div>
  </main>

  <script src="job-board-ui.js"></script>
  <script>
    var CV_BASE = "https://checkloops.co.uk/cv.html";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      await loadApplications();
      bindDeleteActions();
      bindBackupDownload();
    }

    async function checkSupabase() {
      try {
        var res = await fetch("/api/status");
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || ("Status failed (" + res.status + ")"));
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", data.supabaseAccessOk ? "green" : "amber", data.supabaseAccessOk ? "Connected" : "Optional");
      } catch (e) {
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    async function loadApplications() {
      try {
        var res = await fetch("/api/applications");
        var data = await res.json();
        if (!res.ok) throw new Error((data && data.message) || res.status);
        JobBoardUI.renderApplicationsTable("results", data, CV_BASE, { showDelete: true });
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + JobBoardUI.esc(e.message) + "</p>";
      }
    }

    function bindDeleteActions() {
      document.getElementById("results").addEventListener("click", async function(event) {
        var button = event.target.closest(".app-delete-btn");
        if (!button) return;
        var ref = button.getAttribute("data-ref");
        if (!ref) return;
        var company = button.getAttribute("data-company") || ref;
        if (!window.confirm('Delete application "' + company + '"? This removes it from local cache, Supabase and GitHub.')) return;
        await deleteApplication(ref, button);
      });
    }

    async function deleteApplication(ref, button) {
      var original = button.textContent;
      button.disabled = true;
      button.textContent = "Deleting...";
      try {
        var res = await fetch("/api/delete-application", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ref: ref })
        });
        var data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("Delete failed (" + res.status + ")"));
        await loadApplications();
      } catch (error) {
        alert("Delete failed: " + error.message);
        button.disabled = false;
        button.textContent = original;
      }
    }

    function bindBackupDownload() {
      var button = document.getElementById("download-backup-button");
      if (!button) return;
      button.addEventListener("click", async function() {
        var originalText = button.textContent;
        button.disabled = true;
        button.textContent = "Preparing backup...";
        try {
          var res = await fetch("/api/export-applications-backup");
          if (!res.ok) {
            var err = await res.json().catch(function() { return {}; });
            throw new Error(err.error || ("Backup failed (" + res.status + ")"));
          }
          var blob = await res.blob();
          var contentDisposition = res.headers.get("Content-Disposition") || "";
          var filenameMatch = contentDisposition.match(/filename=\"([^\"]+)\"/);
          var filename = filenameMatch ? filenameMatch[1] : "applications-backup.json";
          var url = URL.createObjectURL(blob);
          var link = document.createElement("a");
          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          alert("Backup failed: " + error.message);
        } finally {
          button.disabled = false;
          button.textContent = originalText;
        }
      });
    }
  </script>
</body>
</html>
