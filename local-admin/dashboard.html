<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Applied Jobs</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="dashboard.html" class="active">Applied Jobs</a>
    <a href="indeed.html">Indeed</a>
    <a href="reed.html">Reed</a>
    <a href="nhs.html">NHS Jobs</a>
    <a href="adzuna.html">Adzuna</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" style="margin-left:auto; color:#999;">← New Application</a>
  </nav>

  <div class="page-shell">
    <h1 class="page-title">Applied Jobs</h1>
    <p class="page-subtitle">All published applications from Supabase.</p>

    <!-- Status lights -->
    <div class="status-bar">
      <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">checking…</span></div>
    </div>

    <!-- Results -->
    <div id="results"><p class="empty-msg">Loading…</p></div>

    <!-- Debug box -->
    <div class="debug-box">
      <div class="debug-header">
        <span>Debug — Raw API Response</span>
        <button onclick="copyDebug()">Copy All</button>
      </div>
      <pre class="debug-pre" id="debug-output">Waiting for data…</pre>
    </div>
  </div>

  <script>
    var SUPABASE_URL  = "https://jntpyqguonknixyksqbp.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudHB5cWd1b25rbml4eWtzcWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODYxNTEsImV4cCI6MjA5MDY2MjE1MX0.Tx2nMTKuguGIRnSwLR2Wm47d68p99DrH2ldIWWKOuBs";
    var CV_BASE = "https://checkloops.co.uk/cv.html";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      await loadApplications();
    }

    async function checkSupabase() {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/applications?select=ref&limit=1", {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON }
        });
        if (!res.ok) throw new Error(res.status);
        setStatus("dot-supabase", "lbl-supabase", "green", "Connected");
      } catch (e) {
        setStatus("dot-supabase", "lbl-supabase", "red", "Error: " + e.message);
      }
    }

    async function loadApplications() {
      try {
        var url = SUPABASE_URL + "/rest/v1/applications?select=ref,company_name,role_title,location,short_code,created_at&order=created_at.desc";
        var res = await fetch(url, {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON, Accept: "application/json" }
        });
        var data = await res.json();
        debugLog(data);

        if (!data.length) {
          document.getElementById("results").innerHTML = '<p class="empty-msg">No applications yet.</p>';
          return;
        }

        var rows = data.map(function(app) {
          var cvUrl = app.short_code ? CV_BASE + "?sc=" + enc(app.short_code) : CV_BASE + "?ref=" + enc(app.ref);
          var date = app.created_at ? new Date(app.created_at).toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"}) : "";
          return '<tr><td><a href="' + esc(cvUrl) + '" target="_blank">' + esc(app.company_name || app.ref) + '</a></td>'
            + '<td>' + esc(app.role_title || "") + '</td>'
            + '<td>' + esc(app.location || "") + '</td>'
            + '<td>' + esc(date) + '</td>'
            + '<td><a href="' + esc(cvUrl) + '" target="_blank">View CV</a></td></tr>';
        }).join("");

        document.getElementById("results").innerHTML =
          '<p class="result-count">' + data.length + ' application(s)</p>'
          + '<table class="data-table"><thead><tr><th>Company</th><th>Role</th><th>Location</th><th>Date</th><th></th></tr></thead>'
          + '<tbody>' + rows + '</tbody></table>';
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">Error: ' + esc(e.message) + '</p>';
        debugLog({ error: e.message });
      }
    }

    function setStatus(dotId, lblId, color, text) {
      document.getElementById(dotId).className = "status-dot status-dot--" + color;
      document.getElementById(lblId).textContent = text;
    }

    function debugLog(obj) {
      document.getElementById("debug-output").textContent = JSON.stringify(obj, null, 2);
    }

    function copyDebug() {
      navigator.clipboard.writeText(document.getElementById("debug-output").textContent).then(function() {
        var btn = document.querySelector(".debug-header button");
        btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy All"; }, 1500);
      });
    }

    function esc(s) { if (!s) return ""; var d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
    function enc(s) { return encodeURIComponent(s); }
  </script>
</body>
</html>
