<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewed Jobs</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="jobspy.html">Job Search</a>
    <a href="dashboard.html">Applied Jobs</a>
    <a href="reviews.html" class="active">Reviews</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" class="nav-link--muted">New Application</a>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">AI Reviews</p>
      <h1 class="page-title">Reviewed Jobs</h1>
      <p class="page-subtitle">Jobs you flagged for AI review, with strengths, gaps, and dealbreakers analysed against your CV.</p>
    </section>

    <div class="page-grid">
      <section class="status-bar">
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">Checking…</span></div>
        <div class="status-item" id="count-chip">Loading…</div>
      </section>

      <section class="results-shell results-shell--stacked">
        <div id="results"><p class="empty-msg">Loading reviewed jobs…</p></div>
      </section>
    </div>
  </main>

  <script src="job-board-ui.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      await loadReviews();
    }

    async function checkSupabase() {
      try {
        var res = await fetch("/api/status");
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || "Status failed");
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", data.supabaseAccessOk ? "green" : "amber", data.supabaseAccessOk ? "Connected" : "Optional");
      } catch (e) {
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    async function loadReviews() {
      var target = document.getElementById("results");
      var countChip = document.getElementById("count-chip");
      try {
        var res = await fetch("/api/reviewed-jobs");
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || "Load failed");

        if (!data.length) {
          target.innerHTML = '<p class="empty-msg">No reviewed jobs yet. Go to Job Search and click ⊕ Review on any job card.</p>';
          countChip.textContent = "0 reviews";
          return;
        }

        countChip.textContent = data.length + " review" + (data.length === 1 ? "" : "s");
        target.innerHTML = '<div class="jobs-grid jobs-grid--stacked">' + data.map(renderReviewCard).join("") + '</div>';

        target.addEventListener("click", function(e) {
          var toggle = e.target.closest(".review-toggle");
          if (!toggle) return;
          var card = toggle.closest(".review-card");
          var body = card.querySelector(".review-card__body");
          var isOpen = body.style.display !== "none";
          body.style.display = isOpen ? "none" : "block";
          toggle.textContent = isOpen ? "▸ Show AI Review" : "▾ Hide AI Review";
        });
      } catch (e) {
        target.innerHTML = '<p class="error-msg">' + JobBoardUI.esc(e.message) + '</p>';
      }
    }

    function renderReviewCard(item) {
      var review = item.review || {};
      var meta = [item.location, item.salary].filter(Boolean).join(" · ");
      var sources = (item.source_labels || []).map(function(s) {
        return '<span class="source-pill">' + JobBoardUI.esc(s) + '</span>';
      }).join("");
      var posted = item.posted_at ? "Posted " + JobBoardUI.fmtDate(item.posted_at) : "";
      var reviewed = item.created_at ? "Reviewed " + JobBoardUI.fmtDate(item.created_at) : "";
      var dateLine = [posted, reviewed].filter(Boolean).join(" · ");

      var bodyHtml = '';
      if (review.strengths && review.strengths.length) {
        bodyHtml += '<div class="ai-section ai-section--green"><strong>✓ Strongest Matches</strong><ul>';
        review.strengths.forEach(function(p) { bodyHtml += '<li>' + JobBoardUI.esc(p) + '</li>'; });
        bodyHtml += '</ul></div>';
      }
      if (review.weaknesses && review.weaknesses.length) {
        bodyHtml += '<div class="ai-section ai-section--amber"><strong>⚠ Weak Points</strong><ul>';
        review.weaknesses.forEach(function(p) { bodyHtml += '<li>' + JobBoardUI.esc(p) + '</li>'; });
        bodyHtml += '</ul></div>';
      }
      if (review.dealbreakers && review.dealbreakers.length) {
        bodyHtml += '<div class="ai-section ai-section--red"><strong>⛔ Dealbreakers</strong><ul>';
        review.dealbreakers.forEach(function(p) { bodyHtml += '<li>' + JobBoardUI.esc(p) + '</li>'; });
        bodyHtml += '</ul></div>';
      }
      if (review.summary) {
        bodyHtml += '<div class="ai-section ai-section--neutral"><strong>Summary</strong><p>' + JobBoardUI.esc(review.summary) + '</p></div>';
      }
      if (!bodyHtml) {
        bodyHtml = '<p class="empty-msg">No AI review data available.</p>';
      }

      return ''
        + '<article class="job-card job-card--ranked review-card">'
        + '<div class="job-card__top">'
        + '<div class="job-card__title-block">'
        + '<div class="job-card__company-row">'
        + (item.company ? '<span class="company-tag">' + JobBoardUI.esc(item.company) + '</span>' : '')
        + sources
        + '</div>'
        + '<h3><a href="' + JobBoardUI.esc(item.url || "#") + '" target="_blank" rel="noopener noreferrer">' + JobBoardUI.esc(item.title || "Untitled") + '</a></h3>'
        + '<div class="meta">' + JobBoardUI.esc(meta) + '</div>'
        + (dateLine ? '<div class="meta-row">' + JobBoardUI.esc(dateLine) + '</div>' : '')
        + '</div>'
        + '<div class="fit-score">'
        + '<span class="fit-score__value">' + JobBoardUI.esc(item.match_score || 0) + '</span>'
        + '<span class="fit-score__label">fit</span>'
        + '</div>'
        + '</div>'
        + '<button class="review-toggle">▸ Show AI Review</button>'
        + '<div class="review-card__body" style="display:none;">'
        + '<div class="ai-review-panel">' + bodyHtml + '</div>'
        + (item.url ? '<div class="actions"><a href="' + JobBoardUI.esc(item.url) + '" target="_blank" rel="noopener noreferrer">Open advert</a></div>' : '')
        + '</div>'
        + '</article>';
    }
  </script>
</body>
</html>
