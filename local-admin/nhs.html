<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — NHS Jobs</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="dashboard.html">Applied Jobs</a>
    <a href="indeed.html">Indeed</a>
    <a href="nhs.html" class="active">NHS Jobs</a>
    <a href="google.html">Google Jobs</a>
    <a href="index.html" style="margin-left:auto; color:#999;">← New Application</a>
  </nav>

  <div class="page-shell">
    <h1 class="page-title">NHS Jobs Search</h1>
    <p class="page-subtitle">Public NHS Jobs XML API — no authentication required.</p>

    <!-- Status lights -->
    <div class="status-bar">
      <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">checking…</span></div>
      <div class="status-item"><span class="status-dot status-dot--grey" id="dot-edge"></span> Edge Function: <span id="lbl-edge">checking…</span></div>
      <div class="status-item"><span class="status-dot status-dot--green" id="dot-nhs"></span> NHS API: <span id="lbl-nhs">Public (always available)</span></div>
    </div>

    <!-- Search form -->
    <div class="search-form">
      <div class="field"><label for="q">Keywords</label><input id="q" value="practice manager OR operations manager OR continuous improvement"></div>
      <div class="field"><label for="loc">Location</label><input id="loc" value="Leek, Staffordshire"></div>
      <div class="field field--small"><label for="dist">Distance (mi)</label><input id="dist" type="number" value="45" min="1" max="100"></div>
      <div class="field field--small"><label for="pg">Page</label><input id="pg" type="number" value="1" min="1"></div>
      <div class="field field--small"><label for="lim">Limit</label>
        <select id="lim"><option value="10">10</option><option value="20" selected>20</option><option value="50">50</option></select>
      </div>
      <button id="search-btn" onclick="doSearch()">Search NHS</button>
    </div>

    <!-- Results -->
    <div id="results"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none;">
      <button onclick="pageNav(-1)">← Previous</button>
      <span id="page-info"></span>
      <button onclick="pageNav(1)">Next →</button>
    </div>

    <!-- Debug box -->
    <div class="debug-box">
      <div class="debug-header">
        <span>Debug — Raw API Response</span>
        <button onclick="copyDebug()">Copy All</button>
      </div>
      <pre class="debug-pre" id="debug-output">Waiting for search…</pre>
    </div>
  </div>

  <script>
    var SUPABASE_URL  = "https://jntpyqguonknixyksqbp.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudHB5cWd1b25rbml4eWtzcWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODYxNTEsImV4cCI6MjA5MDY2MjE1MX0.Tx2nMTKuguGIRnSwLR2Wm47d68p99DrH2ldIWWKOuBs";
    var EDGE_FN = SUPABASE_URL + "/functions/v1/search-nhs-jobs";
    var lastTotalPages = 1;

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      await checkEdge();
    }

    async function checkSupabase() {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/applications?select=ref&limit=1", {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON }
        });
        if (!res.ok) throw new Error(res.status);
        setStatus("dot-supabase", "lbl-supabase", "green", "Connected");
      } catch (e) {
        setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    async function checkEdge() {
      try {
        var res = await fetch(EDGE_FN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ keyword: "test", location: "London", distance: "5", limit: 1, page: 1 })
        });
        var data = await res.json();
        if (data.error) throw new Error(data.error);
        setStatus("dot-edge", "lbl-edge", "green", "Reachable (test returned " + (data.totalResults || 0) + " results)");
        debugLog({ edgeCheck: data });
      } catch (e) {
        setStatus("dot-edge", "lbl-edge", "red", e.message);
      }
    }

    async function doSearch() {
      var btn = document.getElementById("search-btn");
      btn.disabled = true; btn.textContent = "Searching…";
      document.getElementById("results").innerHTML = '<p class="empty-msg">Searching NHS Jobs…</p>';
      document.getElementById("pagination").style.display = "none";

      try {
        var body = {
          keyword: document.getElementById("q").value,
          location: document.getElementById("loc").value,
          distance: document.getElementById("dist").value,
          page: parseInt(document.getElementById("pg").value, 10) || 1,
          limit: parseInt(document.getElementById("lim").value, 10) || 20,
          sort: "publicationDateDesc"
        };
        debugLog({ request: body, endpoint: EDGE_FN });

        var res = await fetch(EDGE_FN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        debugLog({ request: body, response: data });

        if (data.error) {
          document.getElementById("results").innerHTML = '<p class="error-msg">' + esc(data.error) + '</p>';
          return;
        }

        lastTotalPages = data.totalPages || 1;
        renderJobs(data.jobs || [], data.totalResults || 0, body.page, lastTotalPages);

        // Pagination
        if (lastTotalPages > 1) {
          document.getElementById("pagination").style.display = "flex";
          document.getElementById("page-info").textContent = "Page " + body.page + " of " + lastTotalPages + " (" + (data.totalResults || 0) + " total)";
        }
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + esc(e.message) + '</p>';
        debugLog({ error: e.message });
      } finally {
        btn.disabled = false; btn.textContent = "Search NHS";
      }
    }

    function pageNav(dir) {
      var pg = document.getElementById("pg");
      var n = parseInt(pg.value, 10) + dir;
      if (n < 1) n = 1;
      if (n > lastTotalPages) n = lastTotalPages;
      pg.value = n;
      doSearch();
    }

    function renderJobs(jobs, total) {
      if (!jobs.length) {
        document.getElementById("results").innerHTML = '<p class="empty-msg">No results.</p>';
        return;
      }
      var html = '<p class="result-count">' + total + ' total results, showing ' + jobs.length + '</p>';
      jobs.forEach(function(j) {
        var badges = "";
        if (isRecent(j.postDate, 3)) badges += ' <span class="badge badge--new">New</span>';
        if (j.closeDate && isClosingSoon(j.closeDate)) badges += ' <span class="badge badge--closing">Closes ' + esc(fmtDate(j.closeDate)) + '</span>';

        var meta = [j.location, j.salary, j.type].filter(Boolean).join(" · ");
        html += '<div class="job-card">'
          + '<h3><a href="' + esc(j.url) + '" target="_blank">' + esc(j.title) + '</a>' + badges + '</h3>'
          + '<div class="meta">' + esc(j.employer) + ' · ' + esc(meta) + '</div>'
          + (j.postDate ? '<div class="meta">Posted: ' + esc(fmtDate(j.postDate)) + '</div>' : '')
          + (j.description ? '<div class="snippet">' + esc(j.description) + '</div>' : '')
          + '</div>';
      });
      document.getElementById("results").innerHTML = html;
    }

    function setStatus(dotId, lblId, color, text) {
      document.getElementById(dotId).className = "status-dot status-dot--" + color;
      document.getElementById(lblId).textContent = text;
    }
    function debugLog(obj) { document.getElementById("debug-output").textContent = JSON.stringify(obj, null, 2); }
    function copyDebug() {
      navigator.clipboard.writeText(document.getElementById("debug-output").textContent).then(function() {
        var btn = document.querySelector(".debug-header button");
        btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy All"; }, 1500);
      });
    }
    function esc(s) { if (!s) return ""; var d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
    function fmtDate(s) { try { return new Date(s).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); } catch(e) { return s; } }
    function isRecent(s, days) { if (!s) return false; return (Date.now() - new Date(s).getTime()) < days * 86400000; }
    function isClosingSoon(s) { if (!s) return false; var d = (new Date(s).getTime() - Date.now()) / 86400000; return d >= 0 && d <= 7; }
  </script>
</body>
</html>
