<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applied Jobs</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="dashboard.html" class="active">Applied Jobs</a>
    <a href="indeed.html">Indeed</a>
    <a href="jobspy.html">Multi-Site</a>
    <a href="reed.html">Reed</a>
    <a href="nhs.html">NHS Jobs</a>
    <a href="adzuna.html">Adzuna</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" class="nav-link--muted">New Application</a>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Applications</p>
      <h1 class="page-title">Published Jobs</h1>
      <p class="page-subtitle">A cleaner overview of every application you have already published to Supabase.</p>
    </section>

    <div class="page-grid">
      <section class="status-bar">
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">Checking...</span></div>
      </section>

      <section class="results-shell">
        <div id="results"><p class="empty-msg">Loading applications...</p></div>
      </section>
    </div>
  </main>

  <script src="job-board-ui.js"></script>
  <script>
    var SUPABASE_URL = "https://jntpyqguonknixyksqbp.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudHB5cWd1b25rbml4eWtzcWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODYxNTEsImV4cCI6MjA5MDY2MjE1MX0.Tx2nMTKuguGIRnSwLR2Wm47d68p99DrH2ldIWWKOuBs";
    var CV_BASE = "https://checkloops.co.uk/cv.html";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      await loadApplications();
    }

    async function checkSupabase() {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/applications?select=ref&limit=1", {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON }
        });
        if (!res.ok) throw new Error(res.status);
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "green", "Connected");
      } catch (e) {
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    async function loadApplications() {
      try {
        var url = SUPABASE_URL + "/rest/v1/applications?select=ref,company_name,role_title,location,short_code,created_at&order=created_at.desc";
        var res = await fetch(url, {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON, Accept: "application/json" }
        });
        var data = await res.json();
        if (!res.ok) throw new Error((data && data.message) || res.status);
        JobBoardUI.renderApplicationsTable("results", data, CV_BASE);
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + JobBoardUI.esc(e.message) + "</p>";
      }
    }
  </script>
</body>
</html>
