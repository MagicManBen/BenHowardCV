<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Indeed (RapidAPI)</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .usage-gauge { display:inline-flex; align-items:center; gap:0.5rem; background:#f5f5f5; border:1px solid #e0e0e0; border-radius:6px; padding:0.4rem 0.8rem; margin:0.5rem 0; font-size:0.82rem; }
    .gauge-bar { width:120px; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .gauge-fill { height:100%; border-radius:5px; transition:width 0.5s; }
    .gauge-fill--ok { background:#2ecc40; }
    .gauge-fill--warn { background:#f1c40f; }
    .gauge-fill--danger { background:#e74c3c; }
    .gauge-text { font-weight:600; }
    .rate-info { font-size:0.78rem; color:#888; }
  </style>
</head>
<body>
  <nav class="dash-nav">
    <a href="dashboard.html">Applied Jobs</a>
    <a href="indeed.html" class="active">Indeed</a>
    <a href="reed.html">Reed</a>
    <a href="nhs.html">NHS Jobs</a>
    <a href="adzuna.html">Adzuna</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" style="margin-left:auto; color:#999;">← New Application</a>
  </nav>

  <div class="page-shell">
    <h1 class="page-title">Indeed Search</h1>
    <p class="page-subtitle">Via RapidAPI Indeed Scraper. <strong style="color:#e74c3c;">Limit: 1 request/day</strong> on free plan — use wisely!</p>

    <!-- Status lights -->
    <div class="status-bar">
      <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">checking…</span></div>
      <div class="status-item"><span class="status-dot status-dot--grey" id="dot-edge"></span> Edge Function: <span id="lbl-edge">checking…</span></div>
    </div>

    <!-- Usage gauge -->
    <div id="usage-box" style="display:none;">
      <div class="usage-gauge">
        <span>Daily quota:</span>
        <div class="gauge-bar"><div class="gauge-fill gauge-fill--ok" id="gauge-fill" style="width:100%"></div></div>
        <span class="gauge-text" id="gauge-text">—</span>
      </div>
      <div class="rate-info" id="rate-info"></div>
    </div>

    <!-- Search form -->
    <div class="search-form">
      <div class="field"><label for="q">Keywords</label><input id="q" value="Practice Manager OR operations manager OR continuous improvement"></div>
      <div class="field"><label for="loc">Location</label><input id="loc" value="Staffordshire"></div>
      <div class="field field--small"><label for="rad">Radius</label>
        <select id="rad"><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option></select>
      </div>
      <div class="field field--small"><label for="days">Days</label>
        <select id="days"><option value="1">1</option><option value="3">3</option><option value="7" selected>7</option><option value="14">14</option></select>
      </div>
      <div class="field field--small"><label for="rows">Max</label><input id="rows" type="number" value="15" min="1" max="50"></div>
      <div class="field field--small"><label for="sort">Sort</label>
        <select id="sort"><option value="relevance">Relevance</option><option value="date">Date</option></select>
      </div>
      <button id="search-btn" onclick="doSearch()">Search Indeed</button>
    </div>

    <!-- Results -->
    <div id="results"></div>

    <!-- Debug box -->
    <div class="debug-box">
      <div class="debug-header">
        <span>Debug — Raw API Response</span>
        <button onclick="copyDebug()">Copy All</button>
      </div>
      <pre class="debug-pre" id="debug-output">Click Search to begin. Remember: 1 request/day limit!</pre>
    </div>
  </div>

  <script>
    var SUPABASE_URL  = "https://jntpyqguonknixyksqbp.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudHB5cWd1b25rbml4eWtzcWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODYxNTEsImV4cCI6MjA5MDY2MjE1MX0.Tx2nMTKuguGIRnSwLR2Wm47d68p99DrH2ldIWWKOuBs";
    var EDGE_FN = SUPABASE_URL + "/functions/v1/search-indeed-rapid";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      await checkSupabase();
      setStatus("dot-edge", "lbl-edge", "green", "Ready (search-indeed-rapid)");
    }

    async function checkSupabase() {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/applications?select=ref&limit=1", {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON }
        });
        if (!res.ok) throw new Error(res.status);
        setStatus("dot-supabase", "lbl-supabase", "green", "Connected");
      } catch (e) {
        setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    function updateGauge(rl) {
      if (!rl || !rl.limit) return;
      document.getElementById("usage-box").style.display = "block";
      var limit = parseInt(rl.limit) || 1;
      var remaining = parseInt(rl.remaining);
      if (isNaN(remaining)) remaining = limit;
      var used = limit - remaining;
      var pct = Math.round((remaining / limit) * 100);
      var fill = document.getElementById("gauge-fill");
      fill.style.width = pct + "%";
      fill.className = "gauge-fill " + (pct > 50 ? "gauge-fill--ok" : pct > 10 ? "gauge-fill--warn" : "gauge-fill--danger");
      document.getElementById("gauge-text").textContent = remaining + " / " + limit + " remaining";
      var info = "Used today: " + used + " of " + limit;
      if (rl.reset) {
        var rd = new Date(parseInt(rl.reset) * 1000);
        info += " · Resets: " + rd.toLocaleString("en-GB");
      }
      document.getElementById("rate-info").textContent = info;
    }

    async function doSearch() {
      var btn = document.getElementById("search-btn");
      btn.disabled = true; btn.textContent = "Searching… (10-30s)";
      document.getElementById("results").innerHTML = '<p class="empty-msg">Scraping Indeed via RapidAPI… this may take 10-30 seconds.</p>';

      try {
        var body = {
          query: document.getElementById("q").value,
          location: document.getElementById("loc").value,
          radius: document.getElementById("rad").value,
          fromDays: document.getElementById("days").value,
          maxRows: parseInt(document.getElementById("rows").value) || 15,
          sort: document.getElementById("sort").value,
          jobType: "fulltime",
          country: "uk"
        };

        var res = await fetch(EDGE_FN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        debugLog({ request: body, response: data });

        if (data.rateLimits) updateGauge(data.rateLimits);

        if (data.error) {
          document.getElementById("results").innerHTML = '<p class="error-msg">' + esc(data.error) + '</p>';
          return;
        }
        if (!data.ok) {
          document.getElementById("results").innerHTML = '<p class="error-msg">API returned status ' + data.status + '</p>';
          return;
        }

        var jobs = extractJobs(data.data);
        renderJobs(jobs);
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + esc(e.message) + '</p>';
        debugLog({ error: e.message });
      } finally {
        btn.disabled = false; btn.textContent = "Search Indeed";
      }
    }

    function extractJobs(d) {
      if (!d) return [];
      if (Array.isArray(d)) return d;
      if (d.jobs && Array.isArray(d.jobs)) return d.jobs;
      if (d.results && Array.isArray(d.results)) return d.results;
      if (d.data && Array.isArray(d.data)) return d.data;
      return [];
    }

    function renderJobs(jobs) {
      if (!jobs.length) {
        document.getElementById("results").innerHTML = '<p class="empty-msg">No results returned. Check debug output for details.</p>';
        return;
      }
      var html = '<p class="result-count">' + jobs.length + ' jobs found</p>';
      jobs.forEach(function(j) {
        var title = j.title || j.jobTitle || j.name || "Untitled";
        var company = j.company || j.companyName || j.employer || "";
        var loc = j.location || j.locationName || "";
        var salary = j.salary || j.formattedSalary || "";
        var url = j.url || j.link || j.jobUrl || "#";
        var date = j.date || j.postDate || j.datePosted || "";
        var desc = j.description || j.snippet || "";
        var badges = "";
        if (date && isRecent(date, 3)) badges += ' <span class="badge badge--new">New</span>';

        html += '<div class="job-card">'
          + '<h3><a href="' + esc(url) + '" target="_blank">' + esc(title) + '</a>' + badges + '</h3>'
          + '<div class="meta">' + [company, loc, salary].filter(Boolean).map(esc).join(" · ") + '</div>'
          + (date ? '<div class="meta">Posted: ' + esc(date) + '</div>' : '')
          + (desc ? '<div class="snippet">' + esc(desc.substring(0, 200)) + '</div>' : '')
          + '</div>';
      });
      document.getElementById("results").innerHTML = html;
    }

    function setStatus(dotId, lblId, color, text) {
      document.getElementById(dotId).className = "status-dot status-dot--" + color;
      document.getElementById(lblId).textContent = text;
    }
    function debugLog(obj) { document.getElementById("debug-output").textContent = JSON.stringify(obj, null, 2); }
    function copyDebug() {
      navigator.clipboard.writeText(document.getElementById("debug-output").textContent).then(function() {
        var btn = document.querySelector(".debug-header button");
        btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy All"; }, 1500);
      });
    }
    function esc(s) { if (!s) return ""; var d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
    function isRecent(s, days) { try { return (Date.now() - new Date(s).getTime()) < days * 86400000; } catch(e) { return false; } }
  </script>
</body>
</html>
