<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ben T. Howard | Tailored Employer Page</title>
  <style>
    :root {
      --paper: #f8f3ea;
      --paper-2: #fbf8f2;
      --ink: #121212;
      --muted: #6b665f;
      --line: rgba(18, 18, 18, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(169, 137, 79, 0.06), transparent 26%),
        radial-gradient(circle at top right, rgba(18, 18, 18, 0.035), transparent 20%),
        linear-gradient(180deg, var(--paper) 0%, #f8f5ef 28%, var(--paper-2) 100%);
    }

    body {
      color: var(--ink);
      font-family: "Manrope", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .qr-shell {
      min-height: 100dvh;
      padding:
        max(0.75rem, env(safe-area-inset-top))
        max(0.75rem, env(safe-area-inset-right))
        max(0.75rem, env(safe-area-inset-bottom))
        max(0.75rem, env(safe-area-inset-left));
    }

    .qr-frame {
      display: block;
      width: 100%;
      min-height: calc(100dvh - 1.5rem);
      border: 0;
      background: transparent;
    }

    .status-card {
      max-width: 32rem;
      margin: 0 auto;
      padding: 1.1rem 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      line-height: 1.6;
    }

    .status-card[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main class="qr-shell">
    <div class="status-card" id="qr-loading">Loading the full tailored page…</div>
    <div class="status-card" id="qr-error" hidden>Could not load the full tailored page.</div>
    <iframe
      class="qr-frame"
      id="qr-full-frame"
      title="Ben Howard tailored employer page"
      hidden
    ></iframe>
  </main>

  <script src="cv-qr.js?v=2" defer></script>
</body>
</html>
