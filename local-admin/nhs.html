<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHS Jobs Search</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- Legacy source-specific page — main search is jobspy.html -->
  <nav class="dash-nav">
    <a href="jobspy.html">← Job Search</a>
    <a href="nhs.html" class="active">NHS Jobs (legacy)</a>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Job Search</p>
      <h1 class="page-title">NHS Jobs</h1>
      <p class="page-subtitle">Public NHS Jobs feed with the same finished layout and same result-card structure as the other source pages.</p>
    </section>

    <div class="page-grid">
      <section class="status-bar">
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">Checking...</span></div>
        <div class="status-item"><span class="status-dot status-dot--green"></span> NHS API: <span>Public</span></div>
      </section>

      <section class="surface-card search-panel">
        <div class="search-grid">
          <div class="field field--span-6">
            <label for="q">Keywords</label>
            <input id="q" value="practice manager OR operations manager OR continuous improvement">
          </div>
          <div class="field field--span-4">
            <label for="loc">Location</label>
            <input id="loc" value="Leek, Staffordshire">
          </div>
          <div class="field field--span-2 field--compact">
            <label for="dist">Distance (mi)</label>
            <input id="dist" type="number" value="45" min="1" max="100">
          </div>
        </div>

        <div class="search-actions">
          <button id="search-btn" onclick="doSearch()">Search NHS</button>
          <span class="search-summary" id="search-summary">Ready.</span>
        </div>
      </section>

      <section class="results-shell">
        <div id="results"><p class="empty-msg">Run a search to load adverts.</p></div>
      </section>
    </div>
  </main>

  <script src="job-board-ui.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      try {
        var res = await fetch("/api/status");
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || ("Status failed (" + res.status + ")"));
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", data.supabaseAccessOk ? "green" : "amber", data.supabaseAccessOk ? "Connected" : "Optional");
      } catch (e) {
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
    }

    async function doSearch() {
      var btn = document.getElementById("search-btn");
      var summary = document.getElementById("search-summary");
      btn.disabled = true;
      btn.textContent = "Searching...";
      summary.textContent = "Searching NHS Jobs...";
      document.getElementById("results").innerHTML = '<p class="empty-msg">Searching NHS Jobs...</p>';

      try {
        var url = new URL("/api/nhs-search", window.location.origin);
        url.searchParams.set("q", document.getElementById("q").value);
        url.searchParams.set("l", document.getElementById("loc").value);
        url.searchParams.set("distance", document.getElementById("dist").value);
        url.searchParams.set("page", "1");
        url.searchParams.set("limit", "50");
        url.searchParams.set("sort", "publicationDateDesc");
        var res = await fetch(url.toString());
        var data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("Search failed (" + res.status + ")"));

        var jobs = (data.jobs || []).map(function(job) {
          var badges = [];
          if (job.postDate && JobBoardUI.isRecent(job.postDate, 3)) badges.push({ label: "New", tone: "brand" });
          if (job.closeDate && JobBoardUI.isClosingSoon(job.closeDate)) badges.push({ label: "Closing Soon", tone: "accent" });
          return {
            source: "NHS Jobs",
            title: job.title,
            company: job.employer,
            location: job.location,
            salary: job.salary,
            url: job.url,
            dateText: job.postDate ? "Posted " + JobBoardUI.fmtDate(job.postDate) : "",
            metaText: job.type || "",
            description: job.description ? job.description.substring(0, 800) : "",
            badges: badges
          };
        });

        JobBoardUI.renderJobs("results", jobs, {
          summary: (data.totalResults || jobs.length) + " NHS adverts"
        });
        summary.textContent = "Loaded " + jobs.length + " adverts.";
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + JobBoardUI.esc(e.message) + "</p>";
        summary.textContent = "Search failed.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Search NHS";
      }
    }
  </script>
</body>
</html>
