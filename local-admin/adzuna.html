<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adzuna Search</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="dash-nav">
    <a href="dashboard.html">Applied Jobs</a>
    <a href="indeed.html">Indeed</a>
    <a href="jobspy.html">Multi-Site</a>
    <a href="reed.html">Reed</a>
    <a href="nhs.html">NHS Jobs</a>
    <a href="adzuna.html" class="active">Adzuna</a>
    <a href="usage.html">Usage</a>
    <a href="index.html" class="nav-link--muted">New Application</a>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Job Search</p>
      <h1 class="page-title">Adzuna</h1>
      <p class="page-subtitle">Adzuna API results using the same layout, same navigation, and same result-card presentation as the other boards.</p>
    </section>

    <div class="page-grid">
      <section class="status-bar">
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-supabase"></span> Supabase: <span id="lbl-supabase">Checking...</span></div>
        <div class="status-item"><span class="status-dot status-dot--grey" id="dot-edge"></span> Adzuna route: <span id="lbl-edge">Checking...</span></div>
      </section>

      <section class="surface-card search-panel">
        <div class="search-grid">
          <div class="field field--span-5">
            <label for="q">Keywords</label>
            <input id="q" value="practice manager OR operations manager OR continuous improvement">
          </div>
          <div class="field field--span-3">
            <label for="loc">Location</label>
            <input id="loc" value="Staffordshire">
          </div>
          <div class="field field--span-2 field--compact">
            <label for="dist">Distance (km)</label>
            <input id="dist" type="number" value="50" min="1" max="200">
          </div>
          <div class="field field--span-2 field--compact">
            <label for="days">Max days old</label>
            <input id="days" type="number" value="14" min="1" max="90">
          </div>
        </div>

        <div class="search-actions">
          <button id="search-btn" onclick="doSearch()">Search Adzuna</button>
          <span class="search-summary" id="search-summary">Ready.</span>
        </div>
      </section>

      <section class="results-shell">
        <div id="results"><p class="empty-msg">Run a search to load adverts.</p></div>
      </section>
    </div>
  </main>

  <script src="job-board-ui.js"></script>
  <script>
    var SUPABASE_URL = "https://jntpyqguonknixyksqbp.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudHB5cWd1b25rbml4eWtzcWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODYxNTEsImV4cCI6MjA5MDY2MjE1MX0.Tx2nMTKuguGIRnSwLR2Wm47d68p99DrH2ldIWWKOuBs";
    var EDGE_FN = SUPABASE_URL + "/functions/v1/search-adzuna";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/applications?select=ref&limit=1", {
          headers: { apikey: SUPABASE_ANON, Authorization: "Bearer " + SUPABASE_ANON }
        });
        if (!res.ok) throw new Error(res.status);
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "green", "Connected");
      } catch (e) {
        JobBoardUI.setStatus("dot-supabase", "lbl-supabase", "red", e.message);
      }
      JobBoardUI.setStatus("dot-edge", "lbl-edge", "green", "Ready");
    }

    async function doSearch() {
      var btn = document.getElementById("search-btn");
      var summary = document.getElementById("search-summary");
      btn.disabled = true;
      btn.textContent = "Searching...";
      summary.textContent = "Searching Adzuna...";
      document.getElementById("results").innerHTML = '<p class="empty-msg">Searching Adzuna...</p>';

      try {
        var res = await fetch(EDGE_FN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            what: document.getElementById("q").value,
            where: document.getElementById("loc").value,
            distance: parseInt(document.getElementById("dist").value, 10) || 50,
            maxDaysOld: parseInt(document.getElementById("days").value, 10) || 14,
            sortBy: "date",
            page: 1,
            resultsPerPage: 50
          })
        });
        var data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("Search failed (" + res.status + ")"));

        var jobs = (data.jobs || []).map(function(job) {
          var badges = [];
          if (job.created && JobBoardUI.isRecent(job.created, 3)) badges.push({ label: "New", tone: "brand" });
          if (job.contractType) badges.push({ label: job.contractType, tone: "neutral" });
          if (job.contractTime) badges.push({ label: job.contractTime, tone: "brand" });
          return {
            source: "Adzuna",
            title: job.title,
            company: job.company,
            location: job.location,
            salary: job.salary,
            url: job.url,
            dateText: job.created ? "Posted " + JobBoardUI.fmtDate(job.created) : "",
            metaText: job.category || "",
            description: job.description ? job.description.substring(0, 800) : "",
            badges: badges
          };
        });

        JobBoardUI.renderJobs("results", jobs, {
          summary: (data.totalResults || jobs.length) + " Adzuna adverts"
        });
        summary.textContent = "Loaded " + jobs.length + " adverts.";
      } catch (e) {
        document.getElementById("results").innerHTML = '<p class="error-msg">' + JobBoardUI.esc(e.message) + "</p>";
        summary.textContent = "Search failed.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Search Adzuna";
      }
    }
  </script>
</body>
</html>
